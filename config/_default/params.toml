mainSections   = ["posts"]
rssFullContent = true
favicon        = "img/favicon.png"

[footer]
    since = 2020

[sidebar]
    # emoji    = "✏️"
    subtitle = "Lorem ipsum dolor sit amet, consectetur adipiscing elit."
    avatar   = "img/xiaobu.png"

[article]
    [article.license]
        enabled = true
        default = "Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)"

[widgets]
    homepage = [
        { type = "search" },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
        { type = "archives", params = { limit = 5 } },        
    ]
    page     = [{ type = "toc" }]

[comments]
    # See complete configuration in config/_default/params.toml
    enabled  = true
    provider = "giscus"

    [comments.giscus]
        repo             = "wbox9/myblog"
        repoID           = "R_kgDOStvtoA"
        category         = "Announcements"
        categoryID       = "DIC_kwDOStvtoM4DBgmk"
        mapping          = "pathname"
        lightTheme       = "light"
        darkTheme        = "dark_dimmed"
        reactionsEnabled = 1
        emitMetadata     = 0
        inputPosition    = "top"
        lang             = "zh-CN"
        strict           = 0
        loading          = "lazy"

# GDPR Cookie Consent Configuration
# When enabled, analytics and functional cookies require user consent
[cookies]
    enabled = false

    [cookies.categories]
        analytics  = true
        functional = true
